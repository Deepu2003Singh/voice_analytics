<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <style>
      .bg { fill: #f4efe6; }
      .ink { fill: #1a1a1a; }
      .accent { fill: #d8531e; }
      .line { stroke: #1a1a1a; fill: none; stroke-width: 1.5; }
      .dashed { stroke: #1a1a1a; fill: none; stroke-width: 1.2; stroke-dasharray: 4 4; }
      .box { fill: #ebe4d4; stroke: #1a1a1a; stroke-width: 1.5; }
      .accent-box { fill: #d8531e; }
      .small { font-size: 11px; }
      .label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
      .kicker { font-size: 10px; letter-spacing: 0.2em; fill: #8a8478; }
      text { fill: #1a1a1a; }
      text.white { fill: #f4efe6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="480"/>

  <!-- Title -->
  <text x="40" y="40" class="kicker">VOXLENS · SYSTEM ARCHITECTURE</text>
  <text x="40" y="68" font-size="22" font-weight="800">From audio upload to insight dashboard</text>

  <!-- Browser -->
  <rect class="box" x="40" y="110" width="160" height="80" rx="2"/>
  <text x="120" y="138" text-anchor="middle" class="label">BROWSER</text>
  <text x="120" y="158" text-anchor="middle" class="small">single-page UI</text>
  <text x="120" y="174" text-anchor="middle" class="small">HTML · CSS · JS</text>

  <!-- Arrow to Flask -->
  <line class="line" x1="200" y1="150" x2="280" y2="150" marker-end="url(#arrow)"/>
  <text x="240" y="142" text-anchor="middle" class="small">POST /api/analyze</text>
  <text x="240" y="166" text-anchor="middle" class="small" fill="#8a8478">multipart</text>

  <!-- Flask -->
  <rect class="box" x="280" y="110" width="160" height="80" rx="2"/>
  <text x="360" y="138" text-anchor="middle" class="label">FLASK API</text>
  <text x="360" y="158" text-anchor="middle" class="small">app.py</text>
  <text x="360" y="174" text-anchor="middle" class="small">validates · stores · routes</text>

  <!-- Arrow to Analyzer -->
  <line class="line" x1="440" y1="150" x2="520" y2="150" marker-end="url(#arrow)"/>

  <!-- Analyzer -->
  <rect class="accent-box" x="520" y="110" width="180" height="80" rx="2"/>
  <text x="610" y="138" text-anchor="middle" class="label white">VOICE ANALYZER</text>
  <text x="610" y="158" text-anchor="middle" class="small white">analyzer.py</text>
  <text x="610" y="174" text-anchor="middle" class="small white">5-stage pipeline</text>

  <!-- Pipeline stages, dropping below -->
  <line class="dashed" x1="610" y1="190" x2="610" y2="230"/>

  <g>
    <rect class="box" x="40" y="240" width="150" height="180" rx="2"/>
    <text x="115" y="265" text-anchor="middle" class="kicker">01</text>
    <text x="115" y="285" text-anchor="middle" class="label">TRANSCRIBE</text>
    <text x="115" y="310" text-anchor="middle" class="small">faster-whisper</text>
    <text x="115" y="328" text-anchor="middle" class="small">base · int8</text>
    <text x="115" y="346" text-anchor="middle" class="small">VAD filter on</text>
    <text x="115" y="380" text-anchor="middle" class="small" fill="#8a8478">→ text + timestamps</text>
  </g>

  <g>
    <rect class="box" x="210" y="240" width="150" height="180" rx="2"/>
    <text x="285" y="265" text-anchor="middle" class="kicker">02</text>
    <text x="285" y="285" text-anchor="middle" class="label">TAG SPEAKERS</text>
    <text x="285" y="310" text-anchor="middle" class="small">heuristic alternation</text>
    <text x="285" y="328" text-anchor="middle" class="small">greeting detection</text>
    <text x="285" y="346" text-anchor="middle" class="small">Agent ⇄ Customer</text>
    <text x="285" y="380" text-anchor="middle" class="small" fill="#8a8478">→ labelled segments</text>
  </g>

  <g>
    <rect class="box" x="380" y="240" width="150" height="180" rx="2"/>
    <text x="455" y="265" text-anchor="middle" class="kicker">03</text>
    <text x="455" y="285" text-anchor="middle" class="label">SUMMARISE</text>
    <text x="455" y="310" text-anchor="middle" class="small">distilbart-cnn</text>
    <text x="455" y="328" text-anchor="middle" class="small">— or GPT-4o-mini</text>
    <text x="455" y="346" text-anchor="middle" class="small">chunked input</text>
    <text x="455" y="380" text-anchor="middle" class="small" fill="#8a8478">→ 4–6 bullet summary</text>
  </g>

  <g>
    <rect class="box" x="550" y="240" width="150" height="180" rx="2"/>
    <text x="625" y="265" text-anchor="middle" class="kicker">04</text>
    <text x="625" y="285" text-anchor="middle" class="label">SENTIMENT</text>
    <text x="625" y="310" text-anchor="middle" class="small">VADER</text>
    <text x="625" y="328" text-anchor="middle" class="small">per-segment</text>
    <text x="625" y="346" text-anchor="middle" class="small">+ trajectory</text>
    <text x="625" y="380" text-anchor="middle" class="small" fill="#8a8478">→ scored conversation</text>
  </g>

  <g>
    <rect class="box" x="720" y="240" width="150" height="180" rx="2"/>
    <text x="795" y="265" text-anchor="middle" class="kicker">05</text>
    <text x="795" y="285" text-anchor="middle" class="label">KPIs</text>
    <text x="795" y="310" text-anchor="middle" class="small">lexicon-based</text>
    <text x="795" y="328" text-anchor="middle" class="small">CSAT + agent</text>
    <text x="795" y="346" text-anchor="middle" class="small">+ context-specific</text>
    <text x="795" y="380" text-anchor="middle" class="small" fill="#8a8478">→ scored insights</text>
  </g>

  <!-- horizontal pipeline arrows -->
  <line class="line" x1="190" y1="330" x2="210" y2="330" marker-end="url(#arrow)"/>
  <line class="line" x1="360" y1="330" x2="380" y2="330" marker-end="url(#arrow)"/>
  <line class="line" x1="530" y1="330" x2="550" y2="330" marker-end="url(#arrow)"/>
  <line class="line" x1="700" y1="330" x2="720" y2="330" marker-end="url(#arrow)"/>

  <!-- Return arrow back to browser -->
  <line class="line" x1="800" y1="430" x2="800" y2="450" />
  <line class="line" x1="800" y1="450" x2="120" y2="450"/>
  <line class="line" x1="120" y1="450" x2="120" y2="195" marker-end="url(#arrow)"/>
  <text x="450" y="445" text-anchor="middle" class="small">JSON response → dashboard render</text>
</svg>
